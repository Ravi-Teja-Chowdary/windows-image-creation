name: Build Excel Windows Image
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Free Disk Space
        shell: powershell
        run: |
          Write-Host "Reclaiming disk space..."
          $paths = @("C:\Microsoft\AndroidSDK", "C:\usr\local\share\boost", "C:\HostedToolcache\windows\CodeQL")
          foreach ($path in $paths) {
            if (Test-Path $path) { Remove-Item -Recurse -Force $path -ErrorAction SilentlyContinue }
          }

      - name: Download Office Files
        shell: powershell
        run: |
          $url = "https://msoffice-bucket.s3.us-east-1.amazonaws.com/MSOffice.zip"
          Invoke-WebRequest -Uri $url -OutFile "MSOffice.zip"
          # Extract into a specific folder named MSOffice
          Expand-Archive -Path "MSOffice.zip" -DestinationPath "./MSOffice" -Force
          Remove-Item "MSOffice.zip"

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        shell: powershell
        run: |
          # Build the image using the context of the current directory
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/excel-dcom-base:latest .
          
          Write-Host "Pushing image to Docker Hub..."
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/excel-dcom-base:latest
