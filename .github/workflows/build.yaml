name: Build Excel Windows Image
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Free Disk Space
        shell: powershell
        run: |
          Write-Host "Reclaiming disk space on runner..."
          # Remove heavy pre-installed tools to make room for Windows Docker layers
          $paths = @(
            "C:\Microsoft\AndroidSDK",
            "C:\usr\local\share\boost",
            "C:\HostedToolcache\windows\CodeQL",
            "C:\HostedToolcache\windows\Ruby"
          )
          foreach ($path in $paths) {
            if (Test-Path $path) {
              Write-Host "Removing $path..."
              Remove-Item -Recurse -Force $path -ErrorAction SilentlyContinue
            }
          }
          Write-Host "Disk cleanup complete."

      - name: Download Office Files
        shell: powershell
        run: |
          $url = "https://msoffice-bucket.s3.us-east-1.amazonaws.com/MSOffice.zip"
          Write-Host "Downloading MSOffice.zip..."
          Invoke-WebRequest -Uri $url -OutFile "MSOffice.zip"
          
          Write-Host "Extracting files..."
          Expand-Archive -Path "MSOffice.zip" -DestinationPath "./excel_files"
          
          Write-Host "Deleting zip to save space..."
          Remove-Item "MSOffice.zip"

      - name: Switch Docker to Windows Containers
        shell: powershell
        run: |
          $dockerPath = "C:\Program Files\Docker\Docker\DockerCli.exe"
          if (Test-Path $dockerPath) {
              & $dockerPath -SwitchWindowsEngine
          } else {
              Write-Host "Checking current engine..."
              docker info -f '{{.OSType}}'
          }

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        shell: powershell
        run: |
          # The build will now have ~5GB of extra headroom
          docker build -t ravitejachowdarysidhi/excel-dcom-base:latest .
          
          Write-Host "Pushing image to Docker Hub..."
          docker push ravitejachowdarysidhi/excel-dcom-base:latest
