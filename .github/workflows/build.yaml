name: Build Excel Windows Image
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Download Office Files
        shell: powershell
        run: |
          $url = "https://msoffice-bucket.s3.us-east-1.amazonaws.com/MSOffice.zip"
          Invoke-WebRequest -Uri $url -OutFile "MSOffice.zip"
          Expand-Archive -Path "MSOffice.zip" -DestinationPath "."
          # Ensure the folder is named MSOffice for the Docker COPY command
          if (Test-Path "./MSOffice.zip") { Remove-Item "./MSOffice.zip" }

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        shell: powershell
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/excel-dcom-base:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/excel-dcom-base:latest
