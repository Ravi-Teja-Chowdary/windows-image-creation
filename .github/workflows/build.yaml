name: Build Excel Windows Image
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Reclaim Disk Space
        shell: powershell
        run: |
          Write-Host "Clearing space..."
          Remove-Item -Recurse -Force "C:\Microsoft\AndroidSDK" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\usr\local\share\boost" -ErrorAction SilentlyContinue

      - name: Download Office Files
        shell: powershell
        run: |
          $url = "https://msoffice-bucket.s3.us-east-1.amazonaws.com/MSOffice.zip"
          Invoke-WebRequest -Uri $url -OutFile "MSOffice.zip"
          Expand-Archive -Path "MSOffice.zip" -DestinationPath "./MSOffice"
          Remove-Item "MSOffice.zip"

      - name: Switch to Windows Containers
        shell: powershell
        run: |
          $dockerPath = "C:\Program Files\Docker\Docker\DockerCli.exe"
          if (Test-Path $dockerPath) { & $dockerPath -SwitchWindowsEngine }
          docker info -f 'OSType: {{.OSType}}'

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        shell: powershell
        run: |
          # Standard build command without the BuildKit-specific flag
          docker build -t ravitejachowdarysidhi/excel-dcom-base:latest .
          docker push ravitejachowdarysidhi/excel-dcom-base:latest
