name: Build Excel Windows Image
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Reclaim Disk Space
        shell: powershell
        run: |
          Write-Host "Clearing space for Docker layers..."
          Remove-Item -Recurse -Force "C:\Microsoft\AndroidSDK" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\usr\local\share\boost" -ErrorAction SilentlyContinue

      - name: Download Office Files
        shell: powershell
        run: |
          $url = "https://msoffice-bucket.s3.us-east-1.amazonaws.com/MSOffice.zip"
          Invoke-WebRequest -Uri $url -OutFile "MSOffice.zip"
          Expand-Archive -Path "MSOffice.zip" -DestinationPath "./MSOffice"
          Remove-Item "MSOffice.zip"

      - name: Switch to Windows Containers
        shell: powershell
        run: |
          $dockerMode = docker info -f '{{.OSType}}'
          if ($dockerMode -ne "windows") {
            & "C:\Program Files\Docker\Docker\DockerCli.exe" -SwitchWindowsEngine
          }

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        shell: powershell
        run: |
          # --progress=plain is CRITICAL to see the logs from inside the Dockerfile
          docker build --progress=plain -t ravitejachowdarysidhi/excel-dcom-base:latest .
          docker push ravitejachowdarysidhi/excel-dcom-base:latest
