name: Build Excel Windows Image
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Download Office Files
        shell: powershell
        run: |
          # Use your public S3 URL
          $url = "https://msoffice-bucket.s3.us-east-1.amazonaws.com/MSOffice.zip"
          
          Write-Host "Downloading Office files from S3..."
          Invoke-WebRequest -Uri $url -OutFile "MSOffice.zip"
          
          Write-Host "Extracting files..."
          Expand-Archive -Path "MSOffice.zip" -DestinationPath "./excel_files"
          
          # Optional: Delete zip to save disk space on the runner
          Remove-Item "MSOffice.zip"

      - name: Build Docker Image
        shell: powershell
        run: |
          # Switch Docker to Windows Containers
          & "C:\Program Files\Docker\Docker\DockerCli.exe" -SwitchWindowsEngine
          docker build -t ravitejachowdarysidhi/excel-dcom-base:latest .

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Image
        run: docker push ravitejachowdarysidhi/excel-dcom-base:latest
