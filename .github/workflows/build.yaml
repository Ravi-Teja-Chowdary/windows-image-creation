name: Build Excel Windows Image
on: [push]

jobs:
  build:
    runs-on: windows-latest # Newer runners usually provision faster
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Download Office Files
        shell: powershell
        run: |
          # Your Public S3 URL
          $url = "https://msoffice-bucket.s3.us-east-1.amazonaws.com/MSOffice.zip"
          
          Write-Host "Downloading MSOffice.zip from S3..."
          Invoke-WebRequest -Uri $url -OutFile "MSOffice.zip"
          
          Write-Host "Extracting files..."
          Expand-Archive -Path "MSOffice.zip" -DestinationPath "./excel_files"
          
          # Clean up zip to ensure enough disk space for the Docker build
          Remove-Item "MSOffice.zip"

      - name: Switch Docker to Windows Containers
        shell: powershell
        run: |
          $dockerPath = "C:\Program Files\Docker\Docker\DockerCli.exe"
          if (Test-Path $dockerPath) {
              Write-Host "Found DockerCli, switching engine..."
              & $dockerPath -SwitchWindowsEngine
          } else {
              Write-Host "DockerCli.exe not found at standard path. Checking current engine mode..."
              docker info -f '{{.OSType}}'
          }

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        shell: powershell
        run: |
          # Build the image
          # Note: This will take a while as it pulls large Windows base layers
          docker build -t ravitejachowdarysidhi/excel-dcom-base:latest .
          
          # Push the image
          docker push ravitejachowdarysidhi/excel-dcom-base:latest
